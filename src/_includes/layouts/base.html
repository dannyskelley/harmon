<!-- A fully fleshed-out <head>, dynamically changing based on client.json and the page front matter -->

<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Standard meta tags -->
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="{{ description }}">
        <link rel="canonical" href="{{ client.domain }}{{ page.url }}">
        <meta name="generator" content="{{ eleventy.generator }}">

        <!--Social Media Display-->
        <meta property="og:title" content="{{ title }}"/>
        <meta property="og:description" content="{{ description }}"/>
        <meta property="og:type" content="website"/>
        <meta property="og:url" content="{{ client.domain }}{{ page.url }}"/>
        <meta property="og:image" content="{{ client.domain }}{{ image or "/assets/images/og-image.jpg" }}"/>
        <meta property="og:image:secure_url" content="{{ client.domain }}{{ image or "/assets/images/og-image.jpg" }}"/>
        <meta property="og:image:width" content="1200"/>
        <meta property="og:image:height" content="630"/>
        <meta property="og:site_name" content="Infinity Home Solutions LLC"/>

        <!--Twitter Card-->
        <meta name="twitter:card" content="summary_large_image"/>
        <meta name="twitter:title" content="{{ title }}"/>
        <meta name="twitter:description" content="{{ description }}"/>
        <meta name="twitter:image" content="{{ client.domain }}{{ image or "/assets/images/og-image.jpg" }}"/>

        <!--Favicons-->
        <!-- https://realfavicongenerator.net/ -->
        <link rel="icon" type="image/png" href="/assets/favicons/favicon-96x96.png" sizes="96x96"/>
        <link rel="icon" type="image/svg+xml" href="/assets/favicons/favicon.svg"/>
        <link rel="shortcut icon" href="/assets/favicons/favicon.ico"/>
        <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png"/>
        <meta name="apple-mobile-web-app-title" content="Infinity Home Solutions"/>
        <link rel="manifest" href="/assets/favicons/site.webmanifest"/>

        <!-- Preloads -->
        <link rel="preload" as="image" href="/assets/svgs/logo-black.svg">
        <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/roboto-v29-latin-regular.woff2" crossorigin>
        <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/roboto-v29-latin-700.woff2" crossorigin>

        <!-- Sitewide Stylesheets and Scripts -->
        <link rel="stylesheet" href="/assets/css/root.css">
      

        <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
        <script src="https://unpkg.com/aos@2.3.4/dist/aos.js" defer></script>
        <script defer>document.addEventListener('DOMContentLoaded',function(){AOS.init({easing:'ease-in-out-sine'});});</script>

        {% block head %}{% endblock %}

        <title>{{ title }}</title>
    </head>
    <body>
        <!--Screen reader skip main nav-->
        <a class="skip" aria-label="skip to main content" href="#main">Click To Skip To Main Content</a>

        {% include "sections/header.html" %}
        <main id="main">
            {% block body %}{% endblock %}
        </main>
        {% include "sections/footer.html" %}

        <!-- Sticky mobile call bar -->
        <style>
          #sticky-call-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            background: var(--primary);
            padding: 0.75rem 1rem;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.18);
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
          }
          @media only screen and (max-width: 63.9375rem) {
            #sticky-call-bar { display: flex; }
            body { padding-bottom: 4rem; }
          }
          #sticky-call-bar .scb-text {
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.3em;
          }
          #sticky-call-bar .scb-btn {
            display: inline-block;
            background: #fff;
            color: var(--primary);
            font-size: 1rem;
            font-weight: 800;
            text-decoration: none;
            padding: 0.5rem 1.25rem;
            border-radius: 4px;
            white-space: nowrap;
            transition: opacity 0.2s;
          }
          #sticky-call-bar .scb-btn:hover { opacity: 0.88; }
        </style>
        <div id="sticky-call-bar" aria-label="Call us">
          <span class="scb-text">Free Estimates &nbsp;|&nbsp; No Obligation</span>
          <a class="scb-btn" href="tel:{{client.phoneForTel}}">Call {{client.phoneFormatted}}</a>
        </div>

    </body>
</html>
